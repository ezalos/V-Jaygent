notes: |
  Two balls on a slow warm field — one small, bright, almost-white; one
  big, black, a moving void. Inside each: a Julia-set fractal at its own
  parameter, iterated 80 deep per pixel, with orbit-trap banding so
  even the interior of the set has visible structure. The fractal is
  really fractal — infinite detail, each pixel its own escape-time
  computation.

  The mass imbalance matters: equal-mass elastic collision gives
  trivial swaps, but the billiards lib now carries per-ball mass so the
  big black ball barely moves while the small one ricochets hard off
  it. You feel the weight difference.

  Library work (studio/billiards.mjs):
    - per-ball radius and mass carried through state
    - wall collision uses each ball's own radius
    - ball-ball elastic response uses the real unequal-mass formula
    - reset(initial, opts?) lets any piece reconfigure the sim via
      meta.yaml (runtime calls billiards.reset(meta.billiards) on load)
    - new radiusArray getter, uploaded as u_ball_radius[N]

  Shader fractal interiors:
    - fractalBall(p, centre, r, c, hitPulse, light, bass) in prism
    - julia() returns smooth-escape iteration count (standard nu correction)
    - juliaTrap() also returns min |z|² across the orbit — bands the
      interior of the set, not just the outside
    - the small bright ball uses a warm palette; the big black one uses
      a shadow palette that stays mostly black, lit only at deep points
    - c drifts slowly and shudders on bass — the fractal shapes shift
      with the track

  Set to DJ Huntsman's "Neuroknobs 1". The slow percussion suits the
  quiet menace of a big black Julia void drifting across the frame.

  See lib/billiards.glsl (ballMask, ballRim, ballHitRing, ballLens,
  ballShockwave, ballWallEnergy), brainstorming/techniques/
  kaleidoscopes.md, brainstorming/techniques/dvd-logo-bounce.md.
