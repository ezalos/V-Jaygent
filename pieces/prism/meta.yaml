notes: |
  Dihedral symmetry — a real kaleidoscope. Every frame folds its source
  material N times with both rotation AND reflection, so mirror pairs
  appear inside every wedge. The one-character difference from C_n
  (cyclic) symmetry — an abs() on the folded angle — is why this piece
  reads crystalline instead of spinning.

  Set to DJ Huntsman's "Neuroknobs 1" (~7 minutes of modulated percussive
  textures). The track's evolving drones are the right shape for a
  kaleidoscope: slow input, big reflected motion.

  Architecture separates the two concerns kaleidoscopes have always had:
    - source() / interior()   —  what's between the mirrors.
    - kaleidoFold(pixel)      —  the mirror system (D_n dihedral).

  Two background kaleido passes stacked — the main cycles n slowly through
  5..9, a second through 3..6 for depth. Max-blended. Audio drives zoom
  (bass), flow rate, and a softened per-fold wedge glow.

  On top: four bouncing sub-kaleidoscopes, DVD-logo style. Slow
  triangle-wave velocities (~0.02-0.08 per second) so they drift rather
  than race. Each disk runs a nested dihedral fold (outer at nHome
  drifting ±3, inner at nHome/2 drifting ±2 on top of the already-folded
  coords — three temporal scales of motion). Two counter-rotating axes.
  Breathing radius. Slow interior zoom. The pattern is always evolving;
  no orbit ever closes exactly.

  Colour: each disk owns its own hue signature (amber, green, teal,
  violet) from a restrained full-spectrum palette, cycling slowly over
  time so a disk that was warm becomes cool later. Background stays in
  the warm-family palette — that's the VISION "spectrum exception":
  reflection pieces earn the right to colour because breaking light
  into hues is the POINT of a prism.

  Less blinking: continuous fbm shimmer instead of step() sparkles,
  wider-softer bead falloff, bounded interior boost, Reinhard tonemap
  on the output so peaks roll off to warm white rather than clip to
  pure white.

  Wall-bounces shift each disk's tint; "close to corner" adds a subtle
  warm global tint — the DVD-screensaver "is it going to hit?!"
  feeling, made mathematical.

  Audio response throughout: bass nudges speed + zoom + axis jitter; mid
  modulates bead brightness; high drives the soft shimmer. No mouse
  input — the piece breathes on its own.

  Closes the kaleidoscope and audio+no-mouse questions in VISION.md.
  Opens the spectrum-exception rule for future reflection pieces.

  See brainstorming/techniques/kaleidoscopes.md and
      brainstorming/techniques/dvd-logo-bounce.md.
