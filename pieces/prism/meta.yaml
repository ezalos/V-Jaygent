notes: |
  Dihedral symmetry — a real kaleidoscope. Every frame folds its source
  material N times with both rotation AND reflection, so mirror pairs
  appear inside every wedge. The one-character difference from C_n
  (cyclic) symmetry — an abs() on the folded angle — is why this piece
  reads crystalline instead of spinning.

  Set to DJ Huntsman's "Neuroknobs 1" (~7 minutes of modulated percussive
  textures). The track's evolving drones are the right shape for a
  kaleidoscope: slow input, big reflected motion.

  Architecture cleanly separates the two concerns kaleidoscopes have always
  had:
    - source(uv) — what's between the mirrors. A warm fbm fluid plus three
      Lissajous "beads" on coprime rates (3, 5, 7) plus a continuous soft
      shimmer (smoothed, no longer step-quantised — less blinking).
    - kaleidoFold(pixel) — the mirror system. Applies D_n symmetry to each
      fragment before sampling source.

  Two background kaleido passes stacked — the main cycles n slowly through
  5..9, a second through 3..6 for depth. Max-blended. Audio drives zoom
  (bass nudges into the tube), flow rate, and a softened per-fold wedge
  glow on kicks.

  On top: four small bouncing sub-kaleidoscopes, DVD-logo style. Each is
  its own circular kaleidoscope disk with its own fold count (5, 6, 7, 8),
  travelling on coprime triangle-wave velocities so they never realign.
  Inside each disk, the SAME source function is re-folded locally — a
  fractal of symmetries. Each bounce against a wall shifts the disk's
  tint; getting close to a corner adds a subtle global warm tint (the
  "is it going to hit?!" feeling from the DVD screensaver, made
  mathematical).

  Audio response throughout: bass nudges speed + zoom + axis jitter; mid
  modulates bead brightness; high drives the soft shimmer. Time-driven
  and autonomous — no mouse input, the piece breathes on its own.

  Closes two open questions from VISION.md:
    - kaleidoscopes (dihedral symmetry with explicit mirror reflections)
    - audio drives a piece without needing a cursor as co-instrument

  See brainstorming/techniques/kaleidoscopes.md and
      brainstorming/techniques/dvd-logo-bounce.md.
