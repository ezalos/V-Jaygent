title: Swarm
slug: swarm
created: 2026-05-10T11:35:39.786Z
notes: |
  1000 Reynolds boids. Three rules, in order: separation, alignment,
  cohesion (per the original 1987 paper). Toroidal world — boids that
  leave one edge re-enter on the opposite. No field, no finger
  forcing, no per-boid lifespan, no palette wedges. Single warm tone
  with a brighter tip; the only thing on screen is the flock.

  Architecture: two passes. The boids pass holds (pos.xy, vel.xy) in
  a 32x32 region of an rgba16f ping-pong texture; each frame each
  boid checks all 999 others (≈1M fetches, fully cache-friendly) and
  applies the three rules. Display reads u_boids, renders each boid
  as a pointy isoceles SDF triangle oriented along its velocity.

  Per-pixel cost: 1000 texelFetch + early-out when the boid's bounding
  circle doesn't cover this pixel. Display render_scale: 0.5 keeps it
  under the bandwidth ceiling on phone GPUs.

  No audio.
duration: 60
render_scale: 0.5
uniforms: []
published_at: null
passes:
  - name: boids
    shader: boids.frag
    target:
      format: rgba16f
      ping_pong: true
      scale: 0.1
    inputs:
      u_boids: boids
  - name: display
