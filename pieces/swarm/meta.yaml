title: Swarm
slug: swarm
created: 2026-05-10T11:35:39.786Z
notes: |
  1000 Reynolds boids — separation, alignment, cohesion. Toroidal
  world (boids that leave one edge re-enter on the opposite). No
  field, no fingers, no lifespan. Single warm tone with a brighter
  tip; the only thing on screen is the flock.

  Architecture: three passes. (1) `boids` updates each agent — each
  frame each boid scans all 999 others (a tight 1M-fetch loop, fully
  cache-friendly). (2) `bins` buckets the boids into a 32×32 spatial
  grid, storing up to 4 boid IDs per cell — gives display a constant
  per-pixel cost. (3) `display` reads the 3×3 cells around each
  pixel, fetches at most ~36 nearby boids, and renders each as a
  pointy SDF triangle oriented along velocity.

  No audio.
duration: 60
render_scale: 0.4
uniforms: []
