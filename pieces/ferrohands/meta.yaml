title: Ferrohands
slug: ferrohands
created: 2026-05-10T15:30:16.169Z
notes: |
  Interactive ferrofluid drop. A single coherent dark puddle floats on a
  warm sunset gradient. Up to 8 simultaneous fingers act as magnets held
  over the drop — directly under each finger, the surface erupts in a
  hex-packed cluster of Rosensweig spike cones. The drop body deforms
  organically as fingers press in.

  Closed brief — no audio, no keyboard, no extra layers. The interaction
  model is the entire point.

  Architecture (passes:, not layers:):

    1. simulate — rgba16f ping-pong @ 0.5x. Half-resolution height field
       h(x,y) on top of a static reservoir(p) bowl that defines the drop's
       rest shape. PDE:
           dh/dt = D*lap(h) - G*(h - reservoir) + alpha*E - beta*max(h-rest,0)^3
       Cubic damping applies only to the SPIKE protrusions above the
       body, so the body sits at reservoir without fighting gravity.
       4 sub-iterations per frame.

    2. display — gradient-to-normal embossing of the height field,
       Lambertian + specular + warm wet rim along the silhouette.
       Background is a bright sunset gradient (wine -> hot ember ->
       amber). The dark drop reads as a clear silhouette against it.
       Per-finger pinpoint glow for tactile feedback.

  Magnetic forcing model:
    - Each finger contributes a TIGHT GAUSSIAN pull (exp(-r^2 * 110)) to
      the field-energy E. Not a Coulomb 1/r^2 attractor — that drags the
      drop body across the canvas; tight Gaussian keeps the drop compact
      and the spike effect local under each finger.
    - Hex-lattice modulation of E (capillary length scale injection) is
      gated by smoothstep(E_CRIT, E_CRIT*1.6, E) AND by exp(-minDist*16)
      where minDist is the distance to the nearest active finger. This
      gives canonical Rosensweig: spikes only erupt directly under each
      held magnet, not everywhere the field reaches.
    - Fresh touches (age < 0.4s) get a strength kick so taps register
      as discrete spike-bursts.

  Input wiring:
    fingers (primary)  -> u_touches[8] feeds 8 magnet positions into
                          the sim. Each finger raises a hex-spike
                          cluster on the drop surface where it pokes.
    no audio           -> closed brief.
    idle behaviour     -> when u_touch_count == 0 (headless inspect,
                          idle desktop), two Lissajous-orbit magnets
                          inside the drop body keep the surface alive.

duration: 60
render_scale: 1
passes:
  - name: simulate
    shader: sim.frag
    target:
      format: rgba16f
      ping_pong: true
      scale: 0.5
    inputs:
      u_state: simulate
    iterations: 4
  - name: display
    shader: shader.frag
    target: screen
    inputs:
      u_state: simulate
published_at: null
