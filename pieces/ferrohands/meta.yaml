title: Ferrohands
slug: ferrohands
created: 2026-05-10T15:30:16.169Z
cursor: true
notes: |
  Levitating ferrofluid sphere — small core, big spikes. A tiny dark
  ball floats in a warm void; up to 8 simultaneous fingers act as
  magnets that pull dramatic radial spike clusters out of the
  sphere's surface in all directions at once. Each finger erupts a
  hex-packed cluster of Rosensweig cone tips that extends 3-5 core
  radii outward. The smooth body relaxes back when fingers lift.

  Closed brief — no audio, no keyboard, no extra layers. The interaction
  model is the entire point.

  Architecture (passes:, not layers:):

    1. simulate — rgba16f ping-pong @ 0.5x. Half-resolution displacement
       field h(x,y); positive h represents outward radial extension of
       the sphere's silhouette. PDE:
           dh/dt = D*lap(h) - G*h + alpha*E - beta*max(h,0)^3
       Forcing E is concentrated on a thin annulus around the sphere
       (rimBand) so spikes form on the surface, not deep inside or far
       in empty space. 4 sub-iterations per frame.

    2. display — sphere SDF dist = |p| - (R_BALL + h*DISP). Pixels with
       dist < 0 render as 3D-shaded sphere (analytic sphere normal +
       gradient bumps from h). Wet warm rim along the silhouette where
       it meets the void. Dark warm void background.

  Magnetic forcing model:
    - Each finger contributes a TIGHT GAUSSIAN pull (exp(-r^2 * 95)) to
      the field-energy E. Restricts effect to ~0.10 world units around
      each magnet so the ball stays coherent.
    - Hex-lattice modulation of E (capillary length scale) gated by
      smoothstep over E magnitude AND by exp(-minDist*14) where minDist
      is distance to nearest finger. Canonical Rosensweig: spikes only
      under each held magnet, not everywhere the field reaches.
    - Fresh touches (age < 0.4s) get a strength kick so taps register
      as discrete spike-bursts.

  Input wiring:
    fingers (primary)  -> u_touches[8] feeds magnet positions into
                          the sim. Each finger raises a hex-spike
                          cluster on the sphere's surface, extending
                          the silhouette outward at that angle.
    no audio           -> closed brief.
    idle behaviour     -> when u_touch_count == 0 (headless inspect,
                          idle desktop), four evenly-distributed
                          orbit-just-outside phantom magnets pull
                          spike clusters on all sides simultaneously
                          so the piece self-plays.
duration: 60
render_scale: 1
passes:
  - name: simulate
    shader: sim.frag
    target:
      format: rgba16f
      ping_pong: true
      scale: 0.5
    inputs:
      u_state: simulate
    iterations: 4
  - name: display
    shader: shader.frag
    target: screen
    inputs:
      u_state: simulate
