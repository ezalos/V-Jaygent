notes: |
  Daft Punk — *Harder, Better, Faster, Stronger*. v6: 7 layers,
  three input channels, real physics + black holes + glitch.
  Press Shift+H for the full controls panel.

  Layer stack (bottom → top), each with its own role + inputs:

  1. solid-warm       slow warm gradient base. no inputs.
  2. lodestone-pull   3 orbiting masses publishing a vec2 `force`
                      field. alpha 0 — invisible, only the data
                      reaches downstream consumers. bass scales.
  3. flow-particles   consumes `force`, advects sparse particles
                      via 4-step semi-Lagrangian integration of
                      u_history. spawns scale with bass + held
                      keys. downbeat fires a centre burst.
  4. mirror-bloom     segmented gear + central core. cursor →
                      centre. bass + kick → scale. bar phase →
                      rotation. beat phase → tooth-snap. downbeat
                      → expanding ring. section → tooth count
                      cycle 8/12/16. white keys grow inner teeth,
                      black keys grow outer-ring teeth, any key
                      inflates core. hi-hat sparkle dots. palette
                      amber → ember → wine across u_song_progress.
  5. black-holes      4 + cursor gravitational wells lensing
                      u_below (everything beneath). dark cores
                      with bright accretion-disc rims. downbeat
                      pulses inflate the dark zones briefly.
  6. glitch-rgb       section-transition glitch — first 8% of
                      each new section breaks the image into
                      block-displaced rows with per-channel RGB
                      shift, scan-line tearing, and drop-frame
                      artifacts. quiet during steady sections.
                      mild downbeat glitches at 45% intensity.
  7. key-rays         15 radial beams (9 white + 6 black) on top
                      of the whole composition. held key sustains
                      a glow ray; pressing fires an inward spear.

  Interactions and couplings:
    lodestone-pull → flow-particles (publish/consume `force`)
    flow-particles → u_history (own state for advection)
    mirror-bloom   → u_below (sees particles beneath); reads
                     cursor + audio + keys
    black-holes    → u_below (lenses gear + particles); cursor
                     drags the 5th well
    glitch-rgb     → u_below (post-processes everything below
                     it); fires only on section transitions
    key-rays       → u_below (sees the lensed/glitched
                     composition); 15 keys drive
    All layers share the engine's u_history feedback loop.

  Three input channels:
    cursor    → mirror-bloom centre + black-holes 5th well
    keyboard  → flow-particles spawn, mirror-bloom teeth + core,
                key-rays beams. 4 instruments, ±2 octaves, looper.
    audio     → lodestone-pull strength, flow-particles bass,
                mirror-bloom rotation/scale/palette/rings,
                black-holes downbeat pulse, glitch-rgb section
                transitions

  Polyrhythmic clocks: u_time (gear baseline, hole orbits,
  particle hash drift), u_bar_phase (gear rotation), u_beat_phase
  (tooth snap), u_downbeat (concentric pulse + particle burst +
  hole inflation + mild glitch), u_section_progress (glitch
  intensity gate), u_section_id (tooth-count cycle, palette
  selector), u_song_progress (palette ramp), per-key envelopes
  (15 channels of beam + tooth + spawn density).

  Press Shift+H for the controls panel.
