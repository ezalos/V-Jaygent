title: "stronger"
slug: stronger
created: 2026-05-05T23:55:00.000Z
notes: |
  Daft Punk — *Harder, Better, Faster, Stronger* (Discovery, 2001).
  v2: rewrote around a kaleidoscope core to land mesmerizing,
  cursor-interactive, and visibly phase-locked to the music.

  Move the cursor — the kaleidoscope's centre follows. Let go and
  it self-plays.

  Music coupling (every line is GEOMETRY, not brightness):
    u_audio_bass         → radial zoom (pull-in on bass)
    u_audio_kick         → one-frame zoom snap (visible kick anchor)
    u_bar_phase          → continuous wedge rotation (1 bar = 1 cycle)
    u_beat_phase         → micro-snap on every beat (rotation jump)
    u_downbeat           → expanding halo ring (clear bar marker)
    u_section_id         → fold count cycles 4 → 6 → 8 → 4 ...
    u_section_progress   → cross-fade between fold counts
    u_to_section_change  → pre-tension squeeze in last 4 bars
    u_audio_high         → hi-hat sparkle on the bright ridges
    u_song_progress      → palette amber → ember → wine across the track

  Stack:
    solid-warm     — warm gradient base
    mirror-bloom   — kaleidoscope (NEW); reads u_below and u_history,
                     consumes nothing, publishes nothing.

  This is a 2-layer piece, not 3 — the publish/consume coupling from
  v1 was over-engineering for what HBFS actually needed (which is
  hard music coupling + interaction, not invisible physics fields).

  Reverted: lodestone-pull is no longer in the stack (and the layer
  itself remains in layers/ for future pieces).
