title: "stronger"
slug: stronger
created: 2026-05-05T23:55:00.000Z
keyboard_synth: true
notes: |
  Daft Punk — *Harder, Better, Faster, Stronger* (Discovery, 2001).
  v3: 4 simultaneous interactive layers — kaleidoscopic-mechanical
  gear visuals locked to the music, plus playable keyboard a..l
  driving radial beams that ride over the gear and the central
  core that swells to chords.

  ► Press space to play the track. Move the cursor — the gear's
    centre follows. Hold a..l to play notes through the reverb
    synth and fire matching radial beams.

  Stack (4 layers, each independently interactive):
    solid-warm     — slow warm gradient base
    mirror-bloom   — segmented gear + concentric pulse rings.
                     Cursor → centre. Bass + kick → radial scale.
                     Bar phase → continuous gear rotation. Beat
                     phase → tooth-snap on each beat. Downbeat →
                     expanding ring. Section → palette + tooth
                     count (8/12/16 cycling). Hi-hat → 16-dot
                     sparkle ring. Held keys → matching teeth grow
                     on the outer gear; chord → core inflation.
    key-rays       — 9 radial beams at fanned angles around the
                     gear. Held key sustains a soft glow ray;
                     pressing fires a bright spear that travels
                     inward from the screen edge to the gear edge.
                     Per-key warm tint amber → ember → wine left
                     to right.
    ember-spark    — sparse warm sparks with u_history trails on
                     top of the whole composition. Adds depth and
                     mystery without obscuring the structural read.

  Polyrhythmic clocks: u_time (gear baseline + ember drift),
  u_bar_phase (gear rotation), u_beat_phase (tooth snap),
  u_downbeat (concentric pulse), u_section_id (tooth-count cycle),
  u_song_progress (palette amber → wine), key envelopes (per-key
  beams).

  Three input channels coupled into one composition: cursor moves
  the centre, keyboard plays beams + chord-swells the core, audio
  drives the macro structure (rotation rate, scale, palette, ring
  cadence). Idle (no audio, no keys, no cursor) the gear still
  turns and the central core glows so the piece is alive on first
  load.
