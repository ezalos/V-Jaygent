notes: |
  A techno piece set to "April (Audrey Danza's Percs Remix)" by Alpha Tracks
  — 6:15, percussion-forward, no pre-marked song structure. The piece
  responds to what the track is doing *right now*, not to a composed
  timeline. The arc is the track's arc.

  Form: a cavernous stone chamber seen from inside. A pinpoint source at
  the origin lights the surrounding wall, whose radius at each angle is
  carved by three octaves of angular fbm — tall columns protrude inward
  (close, bright), deep recesses cut outward (far, black). The wall
  occupies the outer half of the frame at rest; the air inside is hazy,
  threaded with a faint grain, and crossed by outward pulses that fly
  faster and the wall closes harder on the bass.

  Audio → geometry first, then light:
    - bass  → motion. Pulse propagation speed rides the bass so kicks
              fling the ring outward faster; the wall's relief depth
              amplifies on the beat so columns physically push inward;
              a small camera zoom-punch lurches the view forward on
              each hit. On top of that: core envelope, pulse amplitude,
              wall-light gain, and rim-kick overlay all brighten.
    - mid   → haze density σ; loud mids push the wall back into smoke,
              quiet mids bring it forward.
    - high  → stochastic column glints (13 slots, ~12 Hz stutter).
    - level → compresses the exposure curve AND twists the relief field
              via fbm angle-warp, so loud passages make the stone squirm.

  Interaction (cursor is an instrument, not a garnish):
    - mouse.x pans yaw continuously — dragging rotates the chamber.
    - mouse.y is exponential zoom — cursor up pushes the camera into a
              single column; cursor down pulls back so the whole chamber
              is a lit lozenge in void.
    - idle:   yaw drifts at 0.06 rad/s and the radial breath oscillates
              on a 29 s period, so the frames are never still.

  Palette is deep ember — black → burgundy → rust → ember-orange → warm
  amber. Monotonic warm. The 4am club palette, not the festival stage.

  Arc: opens from near-black (first 30 s exposure ramp 0.25→1.0), sustains,
  intensifies 300-370 s (×1.35), then crushes to black with a final amber
  flash in the last 1.5 s.
