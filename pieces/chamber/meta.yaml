notes: |
  A techno piece set to "April (Audrey Danza's Percs Remix)" by Alpha Tracks
  — 6:15, percussion-forward, no pre-marked song structure. So this piece
  responds entirely to what the track is doing *right now*, rather than to
  a composed timeline. The arc is the track's arc.

  Form: a polar-coordinate scene read as a cavernous chamber seen from inside.
  The origin is a luminous source; outward radius is depth into the room; at
  ~r = 1 the chamber wall, relief-carved by fbm-noise angular modulation so
  columns and recesses emerge only where light reaches them.

  Illumination is volumetric — emission at the origin, haze of density σ in
  the air, transmittance exp(-σ·r) falls off toward the rim. σ is driven by
  the mid-band (loud mids = thick smoke, light trapped near the core; quiet
  mids = clear air, wall visible). The bass drives both the sustained core
  brightness and a continuous outward wave pattern whose amplitude is gated
  by the bass level — kicks push visible light across the room. The high
  band fires percussive radial slashes at fixed angular slots around the
  rim (13 of them) via a time-bucketed stutter.

  Mouse.x pans the yaw angle continuously, so dragging across rotates the
  chamber under you. Mouse.y is ignored; ceiling and floor are symmetrical.
  If the cursor hasn't moved, yaw drifts slowly on its own.

  Palette is deep ember — black → burgundy → rust → ember-orange → warm
  amber. Monotonic warm, narrow, pushed down into low luminance. The 4am
  club palette, not the festival-stage one. Dark-warm is still warm.

  Ends: last 1.5s crushes to black with a final amber flash.
