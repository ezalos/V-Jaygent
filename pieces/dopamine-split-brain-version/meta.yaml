notes: |
  Madelline — *Dopamine (Split Brain Version)*, 2024. 165s, 136 BPM,
  D# minor, 6 sections, climax at 107–148s.

  Two hemispheres, one piece. Each side is a hex lattice of Kuramoto-
  style phase oscillators with its own natural frequency. The 5% ω
  detune between sides means they slow-drift in and out of beat-aligned
  phase even when nothing else is happening — the picture is alive
  before the song does anything.

  Layer stack (bottom → top), on the engine's near-black clear:

  1. hemisphere ×2     left side at side=-1, palette wine/mauve/cream,
                       no rotation. Right side at side=+1, palette
                       ember/amber/gold, hex grid rotated 60°.
                       ω_left = 2π · (BPM/60) · 0.5 ≈ 7.13 rad/s,
                       ω_right = 1.05 · ω_left so the two sides drift.
                       Both layers max-blend.
  2. callosum-seam     vertical seam at x=0.5. Lightning bolt fires on
                       every downbeat at a fresh y. Section-4 fusion
                       bloom dissolves the seam into a moiré of both
                       hemispheres' grids. Cursor near the seam sparks
                       locally — the cursor IS the corpus callosum.
                       Screen-blends on top of the two hemispheres.
  3. chaos-warp        smooth single-scale curl-noise warp of
                       u_below + heavy u_history feedback (decay 0.92).
                       NO discrete events — no stochastic tears, no
                       chromatic separation, no per-beat micro-pulses.
                       The chaos is purely cumulative: a slow-evolving
                       flow field (period ~30s) gently transports
                       pixels, and the heavy history accumulates trails
                       into persistent structures whose configuration
                       differs across 20s windows even though any 1s
                       window reads as smooth flow. Section-gated
                       chaos budget rises 0.12 (intro) → 0.90 (climax)
                       and fades through the outro, smooth-ramped
                       within each section. Cursor locally suppresses
                       warp — viewer carves out a still anchor inside
                       the flow. This layer exists to satisfy the
                       Lyapunov-chaos sweet spot from VISION.md §"On
                       unpredictability" — locally smooth (1s
                       continuity), globally divergent (20s windows
                       differ categorically).

  Section vocabulary (NOT just re-shaded params):
    0 (0–8.4s)      intro — only LEFT hemisphere visible; right fades in
    1 (8.4–35.8s)   verse — both dim; seam visible; no cross-coupling
    2 (35.8–50.5s)  build — both brighter; downbeats fire faint bolts
    3 (50.5–107s)   pre-peak — independent chaos; bolts fully active
    4 (107–148.7s)  CLIMAX — fusion: seam dissolves, hemispheres merge
                    into one moiré field; "dopamine" reward state
    5 (148.7–165s)  outro — severance: fusion collapses; both fade dark

  Inputs:
    audio   → bass kicks accent brightness; downbeat fires lightning;
              section_id picks the visual vocabulary; section_progress
              ramps the fusion strength across section 4.
    cursor  → corpus-callosum: cursor near x=0.5 brightens local
              oscillators on both sides, simulating local coupling.

  Three timescales of liveness:
    sub-beat   per-cell jitter at ~5 Hz so cells never freeze
    beat       beat_phase * bass modulates accent brightness
    section    section_id drives palette/coupling/seam mode

  Idle: hemispheres pulse on synthetic 2.27 Hz clock; ω detune still
  drives slow in/out-of-phase drift; macro hotzones still wander.
  No frame is empty.

  Palette: cream-on-near-black contrast per hemisphere (NOT all
  mid-warm soup). Wine→mauve→cream on the left; ember→amber→gold on
  the right. Both warm. The fusion event mixes both palettes — gold
  oscillators overlap with mauve oscillators briefly.
