notes: |
  A piece composed to Pink Floyd's "Money" (Dark Side of the Moon, 1973 — the
  4:43 music-video edit). Written because the song is in 7/4 and every audio
  visualization I've ever seen is built around four. Seven is the whole thing.

  The form: a 7-fold kaleidoscopic lattice with a hyperbolic-feeling radial
  depth so rings pack toward the rim the way tiles do on a Poincaré disk.
  Rotation advances in discrete 7-beat steps locked to the meter — you feel
  the 7 in your body. Palette stays in the warm family (gold → amber → wine
  → mauve) so adjacent cells read as facets of a prism rather than a rainbow.

  How the track shapes it:
    - bass              → core glow + beat-snap rotation
    - mid               → palette phase drift
    - high              → boundary sparkle during the guitar solo
    - u_audio_time      → section state machine below

  Sections (approximate, tuned to this specific edit):
    0:00-0:30  INTRO    seven-pointed glyph, everything else dark
    0:30-1:50  VERSE    full lattice, 7-step rotation locked
    1:50-2:40  SAX      a radial band floods amber-gold
    2:40-4:00  GUITAR   curvature of the disk relaxes, rotation smooths
    4:00-4:25  RETURN   curvature snaps back, 7-lock resumes
    4:25-4:43  OUTRO    collapse to the glyph, fade

  Track hosted locally — respect to Pink Floyd; this is a visual tribute.
