notes: |
  Mozart, *Rondo Alla Turca* (Allegretto, K. 331 mvt 3), 211.8s,
  123 BPM, A major (with the famous A-minor refrain). 8 sections
  detected by `bin/analyze-audio.mjs`; 94 downbeats.

  Iteration 2 (2026-05-12) — rebuilt as a monolithic single-shader
  piece in the `throb` family after the v1 layer-stack version
  collapsed into uniform warm-on-warm soup (see blocked.md +
  v2 critique). Caravaggio-tight cream-against-near-black contrast.
  Throws away the girih thesis; delivers the music's physicality
  instead — the Turkish March IS percussion. The left-hand staccato
  bass IS the kick, the right-hand triplet ornaments ARE the
  cymbals, the bar boundaries ARE the rotating cross.

  Architecture A (monolithic single-shader). All composition lives
  in one `shader.frag`. No layers/, no haze, no warm-mid washes.
  Deep ember radial gradient (max L ~0.04) holds the ground;
  cream geometry against it is the only high-luminance feature.

  Geometric vocabulary:
    - 8-arm rotating cross — bar-phase rotation, downbeat scale
      impulse, palette flip per `u_section_id` (cream for refrains,
      ember for episodes). Snaps to angle 0 on every section flip
      (rondo recapitulation made visible).
    - Beat ring — expanding cream ring on every beat. Radius =
      beat_phase × 1.05; thickness fades with phase. Bass amplitude
      brightens. Kick transient adds a punch.
    - Bar ring — bigger cream ring on every downbeat. Radius =
      bar_phase × 1.15. Pre-tension squeeze before section change.
    - High-band sparks — 8 angular slots fire per-beat; hash-driven
      per-slot fire decision (random subset each beat). High and
      cymbal amplitudes brighten — Mozart's right-hand triplet runs
      become the audible-as-spark texture.
    - Per-key sparks — each held key fires a bright cream spark at
      its angular slot (15-key piano-on-QWERTY). Per-key
      distinctness — different keys produce visibly different
      sparks at different angles.

  Audio bindings (all PASS shapes — geometric, never bass-on-glow):
    - u_audio_bass        → cross arm length, beat-ring brightness
    - u_audio_kick        → cross arm width, beat-ring punch
    - u_audio_high        → spark amplitude
    - u_audio_cymbal      → spark transient punch
    - u_downbeat          → cross scale impulse
    - u_bar_phase         → cross rotation (1 rev/bar), bar-ring radius
    - u_beat_phase        → beat-ring radius
    - u_section_id        → cross palette flip (cream ↔ ember)
    - u_section_progress  → snap-to-angle-0 on section flip + post-flash
    - u_to_section_change → pre-tension squeeze on cross
    - u_song_progress     → ground deepening toward outro,
                            slow palette tint within each family

  Cursor (u_mouse): cursor pulls the cross center toward itself
  (~0.20 world-units max offset). Idle (u_mouse=(0,0)) → no
  offset, cross stays centered.

  Keyboard (15 keys): each held key fires a bright cream spark at
  its angular slot. Per-key distinctness preserved. Press Shift+H
  for the controls panel.

  Polyrhythm of clocks (10+ distinct sources):
  u_time, u_bar_phase, u_beat_phase, u_section_progress,
  u_section_id, u_downbeat, u_to_section_change, u_audio_bass,
  u_audio_kick, u_audio_high, u_audio_cymbal, u_mouse, u_keys[15],
  u_song_progress.

  Arc (sections, 123 BPM):
    [0–5s]    silence / pickup        — ground only, faint cross
    [5–31s]   refrain A (theme)       — cream cross, bright rings
    [31–98s]  episode 1               — ember palette, sparks active
    [98–113s] refrain return          — SNAP back to cream
    [113–143s] episode 2              — ember
    [143–188s] climactic A peak       — bright cream + post-flash
                                        on every section snap
    [188–194s] cadenza                — pre-tension squeeze
    [194–212s] coda + ending          — ground deepens to black,
                                        cross retracts to thin lines
