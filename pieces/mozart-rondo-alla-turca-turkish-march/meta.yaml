notes: |
  Mozart, *Rondo Alla Turca* (Allegretto, K. 331 mvt 3), 211.8s,
  123 BPM, A major (with the famous A-minor refrain). 8 sections
  detected by `bin/analyze-audio.mjs`; 94 downbeats.

  Thesis: an illuminated Ottoman rosette. A central 8-pointed
  girih star (intersection of two 45°-rotated squares) holds the
  centre. Four coprime tooth-wheels (7/11/13/17 teeth) at radii
  0.30 → 0.62 ring it. The rondo form is made visible: at every
  section flip the star and the inner three rings SNAP back to a
  recognisable pose (rotation = 0, palette flips), then drift
  through the episode until the next refrain returns them home.

  Layer stack (bottom → top):

  1. solid-warm           warm vertical gradient (global)
  2. haze-drift           slow domain-warped fbm; mid-band warps the
                          field, section-progress drifts the phase.
                          Screen-blended over the base. (piece-local)
  3. ottoman-star         THE FOCAL ELEMENT. 8-pointed girih star.
                          Bar-phase rotation, downbeat scale impulse,
                          palette flips per section_id (gold ↔ ember
                          — rondo refrain vs episode). Section-flip
                          snap + post-flash. (piece-local)
  4. coprime-wheels-turca Four outer rings at coprime tooth counts
                          7/11/13/17. Each on its own clock (bar /
                          section / beat / mid). Cursor wind bows
                          ring radii in cursor azimuth. Snap on
                          section flip. Max-blend over the star.
                          (piece-local)
  5. triplet-bloom        Petal blooms at the 8 star tips, fired by
                          u_audio_high (right-hand triplet runs).
                          Per-key bloom slot at 15 angular positions
                          for keyboard players. Screen-blended.
                          (piece-local)
  6. vignette-grain       Warm vignette + 1/f grain. Reads u_below.
                          Replace. (piece-local)

  Audio bindings (PASS shapes — geometric, never bass-on-glow):
    - u_audio_bass        → ottoman-star scale impulse
                          → ring-radius pulse on coprime wheels
    - u_audio_mid         → haze warp amount
                          → ring 3 (P=13) rotation rate
    - u_audio_high        → triplet-bloom intensity at star tips
                          → vignette-grain level
    - u_downbeat          → ottoman-star scale punch
    - u_bar_phase         → ottoman-star rotation (1 rev / bar)
                          → wheel ring 0 (P=7) rotation
    - u_beat_phase        → wheel ring 2 (P=11) rotation snap
    - u_section_progress  → wheel ring 1 (P=11) rotation
                          → haze drift phase
    - u_section_id        → ottoman-star palette flip (gold ↔ ember)
    - u_to_section_change → pre-tension squeeze on star + rings
    - u_song_progress     → wheel + haze palette ramp through warm
                            cycle

  Cursor (u_mouse): wind azimuth + magnitude bows the four outer
  rings in the cursor's direction; faster rings bow more so the wind
  ripples visibly inward. Disjoint from audio's main parameters
  (audio drives star + rotations; cursor only touches outer ring
  radii) — Pattern B from audio-cursor-together.md.

  Keyboard (15 keys, piano-on-QWERTY): each key adds a bloom at its
  fixed angular slot around the star + a tooth on ring (k % 4).
  Per-key distinctness — pressing different keys produces different
  visible effects, not the same effect from any key. Press Shift+H
  for the controls panel.

  Polyrhythm of clocks (12+ distinct sources across 6 layers):
  u_time, u_bar_phase, u_beat_phase, u_section_progress, u_section_id,
  u_downbeat, u_to_section_change, u_audio_bass, u_audio_mid,
  u_audio_high, u_mouse, u_keys[15], u_song_progress.

  Arc (sections, 123 BPM):
    [0–5s]    silence / pickup        — dim ember field
    [5–31s]   refrain A (theme)       — gold star, rings spinning up
    [31–98s]  episode 1               — palette → ember; rings drift
    [98–113s] refrain return          — SNAP back to gold
    [113–143s] episode 2              — ember
    [143–188s] climactic A peak       — bright gold + cream highlights
    [188–194s] cadenza                — pre-tension squeeze
    [194–212s] coda + ending          — ramp toward near-black
