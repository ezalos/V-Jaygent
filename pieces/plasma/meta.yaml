title: "plasma"
slug: plasma
created: 2026-05-10T00:00:00.000Z
notes: |
  Plasma lamp — the glass sphere with a central electrode and
  branching electric filaments arcing through inert gas. Touch the
  glass and a fat ionised arc leaps to your finger. Mobile-friendly:
  u_touches is the primary input (works on desktop click+drag AND
  mobile touch); keyboard is a desktop-only bonus, never required.

  Layer stack (bottom → top):

  1. plasma-base   N=7 chaotic filaments radiating from a central
                   electrode through a polar-domain noise warp. AC
                   strobe at 28Hz, per-filament stochastic flicker,
                   per-fragment crackle grain. Magenta arc bodies,
                   cyan-white peaks, violet ambient gas. Self-plays.
  2. plasma-touch  Per active touch, draws a noise-warped filament
                   from electrode → finger with hot core + soft halo
                   + glass-contact burst at the touch point. Held
                   keys overdrive the discharge (brighter arcs).
                   Multi-touch superposes.
  3. plasma-chord  Each held key sustains an extra fixed-angle
                   filament — whites cyan-white clockwise from top,
                   blacks magenta-violet counter-clockwise. Press-
                   events flash the arc bright. Touch heat raises
                   the global ionisation tint so the cursor is
                   visible in this layer too even with no key held.

  Three input channels:
    cursor / touch → plasma-touch arc + glass burst (PRIMARY)
                     plasma-chord ambient ionisation tint (cross-couple)
    keyboard       → plasma-chord radial filaments (DESKTOP BONUS)
                     plasma-touch arc-thickness multiplier (cross-couple)
    audio          → none

  Mobile budget:
    render_scale 0.85 (FBO at 85% of canvas-px × dpr)
    No FBO ping-pong (`passes:` not used)
    No noise textures (cheap hash21 grain only)
    Per-fragment work bounded by 8 touches + 15 keys + 7 base arcs
    Targets 60fps on Pixel 6 / iPhone 12

  Chaos discipline: the field is meant to look like a real Tesla
  discharge — stepped strobe, stochastic per-arc flicker, fine-
  grained crackle on top of every filament. Smooth animation is the
  enemy here; if it stops crackling, it stops feeling electric.
