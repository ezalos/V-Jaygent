notes: |
  HIRAES — "We Owe No One" (Solitary, 2022). Melodic death metal,
  86 BPM half-time / ~172 double-time feel, F# major, 4:34.

  The forge. A Voronoi tessellation of tempered iron plates on a
  hidden molten substrate. The iron is unforged in the intro, the
  band-entry DROP crystallises the lattice, it half-melts under the
  guitar solo, collapses to cold dark iron in the breakdown, and the
  post-silence DROP re-ignites it. Metal self-forged and unbroken:
  we owe no one. Warm-only palette = a blackbody curve.

  Architecture E — 6-layer stack, bottom -> top:
    1. forge-base       near-black hearth, coal-bed glow. Carries the
                        sparse intro before the plates exist.
    2. fracture-plates  THE LEAD. Voronoi plates + molten substrate.
                        Section state machine: formedness (unforged
                        intro -> crystallised), the drop shockwave,
                        the solo melt. replace blend.
    3. vocal-veins      a braid of white-hot molten veins that ignites
                        when the singer sings (u_audio_vocals_stem)
                        and cools away when she rests. screen blend.
    4. embers           sparks rising off the hottest plates. max blend.
    5. heat-haze        rising fbm displacement of u_below.
    6. vignette-grain   warm vignette, bloom, 1/f grain, Reinhard.

