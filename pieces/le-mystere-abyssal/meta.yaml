notes: |
  Pour Alexandre — joyeux anniversaire.

  MPL, "Le mystère abyssal" (L'Étoile, 2020). One unbroken fall through
  a water column: depth is loss, light is memory. The death of color
  with depth tells the story of the diver who never resurfaced; the
  warm sun under the water is the only warmth in the piece and blooms
  on the choruses, when the friends choose myth over grief.

  Narrative state machine gated on u_time (synced-lyric timestamps in
  lyrics.lrc), NOT on u_section_id. 11 stages: surface / legend /
  expedition / tip-under / descent / twilight / abyss / reversal /
  remembrance / sun-bloom / outro. Master depth(t) + channel-ordered
  extinction pasted as a NARRATIVE block in every layer.

  Brief: brainstorming/pieces/le-mystere-abyssal.md
  Build phase: 1 of 4 (spine) — bubbles, events, sun-bloom, deep-life
  layers still to come.
