notes: |
  Two opposite-polarity lodestones orbit each other through a cubic
  complex field. The function plotted is

      f(z) = z³ + a(t)·z + q/(z−p₁) − q/(z−p₂) + q₃/(z−p₃)

  where p₁ and p₂ carry opposite charges and trace a Keplerian-flavoured
  two-body path: separation 1.00 → 0.14 at perihelion (s=0.65) → 0.55 at
  end. Orbital angle accelerates through perihelion so the pair sweeps
  fastest when closest. A weaker third pole p₃ wanders through to break
  symmetry.

  Colour comes from arg(f) through a warm cyclic palette (gold → orange
  → ember → wine → mauve). Two scales of log-magnitude contour add depth:
  coarse bands for macro structure, fine rings crowding the poles and
  the stagnation point between them. The + pole wears a gold halo, the
  − pole an ember one, so the dipole reads as a dipole.

  Arc: far → approach → flash (residues nearly cancel at closest
  approach, |f| collapses between the poles) → slingshot, with a warm
  shockwave ring radiating out through the recoil → settle wider than
  they started.

  Cursor is an instrument. Mouse.x drags p₃ horizontally through the
  field; mouse.y exponentially zooms the view (top = pull out, bottom =
  dive into the contour detail near the poles). Idle → zoom 1 and p₃
  wanders on its own. Fine-contour frequency scales with zoom so fresh
  detail appears as you push in.
