title: "Silk"
slug: silk
created: 2026-06-02T14:02:39.045Z
architecture: C
testability: pure-self-play
notes: |
  ## Brief gates (vjay-new-piece §1b + §1c)
  canonical_ref: |
    Two iterated-point systems plotted as density histograms via
    CPU-streamed orbit + GPU scatter (additive blend into rgba16f).

    (1) Clifford strange attractor (Pickover 1990, codingclubuc3m 2019):
        x' = sin(a y) + c cos(a x)
        y' = sin(b x) + d cos(b y)
        Four canonical seeds (web / lace / fold / curl), audio stems
        drive the morph between them.
    (2) Chaos game on a regular n-gon with neighbour-restriction k=2
        (Fronkonstin / aschinchon 2019). Polygon order n snaps at
        section boundaries — intro/outro=3 (Sierpinski),
        verse=5 (pentagonal lace), pre-peak=6 (hex flower),
        peak=7 (max complexity), quiet=5 (pentagonal recap).

    Renderer: vertex-shader point-sprite scatter into rgba16f, log
    tone-map + warm palette in the display pass. The fractal-flame
    aesthetic the layer-engine v1 couldn't reach. See
    `brainstorming/critiques/silk-v1-blocked.md` for why v1 didn't
    work and `studio/runtime.mjs` §"scatter passes" for the new
    primitive.

  eye_landing_candidates:
    - Clifford filament centroid (densest 1-2 lobes — wanders as
      a,b,c,d morph)
    - chaos-game polygon vertices (n bright nodes on the rim,
      brightness modulated per beat)
    - polygon central void (the "hole" — pentagonal / hex / heptagonal
      negative space reads as architecture)
    - section-snap event (polygon vocabulary changes — that IS the
      eye-landing)

  warm_cycle: [near-black, wine, rust, amber, cream]

  idle_behaviour: |
    At u_audio_playing == 0 the orbit-streamer still runs each frame
    so the accumulators paint continuously. The decay 0.96/frame
    ensures old paths fade in ~1s, so the structure is always
    re-emerging. Parameters drift on coprime time clocks even without
    audio (handled by lo/hi-with-`bass_stem` falling back through the
    runtime's synthetic-driver substitution).

  arch_rationale: |
    Architecture C (passes:) with scatter-pass kind. silk-v1 attempted
    layer-engine u_history scatter (E) and failed: fragment shaders
    are gather-only, so per-fragment self-hit probability for a chaotic
    attractor is ~10⁻⁵, far too low for visible density accumulation.
    The new scatter pass type (added 2026-06-02 to studio/runtime.mjs)
    runs CPU orbit iteration in JS and rasterises N points per frame
    via vertex shader with additive blending into rgba16f. This is
    the documented realtime fractal-flame path.

  ## Thesis
  Two iterated-point systems sharing a display: Clifford carries
  continuous liveness (4 audio-modulated parameters morph the
  filament), chaos-game carries structural identity (polygon order
  snaps at section boundaries). Cream-on-near-black, max contrast,
  fractal-flame aesthetic.

  ## Audio bindings
  - bass_stem  → Clifford `a` (morph web ↔ lace)
  - mid        → Clifford `b`
  - high       → Clifford `c`
  - other_stem → Clifford `d`
  - section_id → chaos-game polygon `n` (table 3-5-6-7-5-3-5-6)
  - bass       → display brightness lift

  ## Music
  Jon Hopkins — "Open Eye Signal" (2013, Immunity remaster 2023).
  https://www.youtube.com/watch?v=2rqH8gT3R4A — 7:48, six-section arc.

duration: 470
render_scale: 1.0
time_source: audio
audio: audio.mp3
audio_features: [beat, sections, stems.bass, stems.drums, stems.other, stems.vocals]

passes:
  - name: accum_clifford
    kind: scatter
    orbit: clifford
    points: 32768
    decay: 0.94
    point_size: 1.8
    target: { format: rgba16f, ping_pong: true, scale: 1.0 }
    params:
      a:          { driver: bass_stem,  lo: -1.25, hi: -1.20 }
      b:          { driver: mid,        lo: -1.25, hi: -1.90 }
      c:          { driver: high,       lo: -1.82, hi:  1.80 }
      d:          { driver: other_stem, lo: -1.91, hi: -1.60 }
      brightness: 0.18
      hue:        0.0
      scale:      0.36

  - name: accum_chaos
    kind: scatter
    orbit: chaos-game
    points: 32768
    decay: 0.94
    point_size: 1.8
    target: { format: rgba16f, ping_pong: true, scale: 1.0 }
    params:
      n:          { driver: section_id, table: [3, 5, 6, 7, 5, 3, 5, 6] }
      k:          { driver: section_id, table: [0, 2, 2, 2, 2, 0, 2, 2] }
      r:          0.5
      phase:      0.0
      brightness: 0.18
      hue:        0.55
      scale:      0.85

  - name: display
    shader: display.frag
    inputs:
      u_clifford: accum_clifford
      u_chaos:    accum_chaos

published_at: null
