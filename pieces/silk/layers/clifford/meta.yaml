name: clifford
identity: "Clifford attractor scatter — orbit histogram on decayed u_history"
default_blend: replace
uniforms:
  iter_count:      { type: float, default: 28.0 }
  seeds_per_frag:  { type: float, default: 4.0 }
  decay:           { type: float, default: 0.945 }
  hit_brightness:  { type: float, default: 28.0 }
  zoom:            { type: float, default: 1.05 }
  morph_a:         { type: float, default: 0.5 }
  morph_b:         { type: float, default: 0.5 }
  morph_c:         { type: float, default: 0.5 }
  morph_d:         { type: float, default: 0.5 }
  cursor_grab:     { type: float, default: 0.0 }
reads:
  - u_below
  - u_history
publishes: []
consumes: []
