notes: |
  Track: Days Without You — Satori feat. Miou Amadee (organic/deep house,
  80.7 BPM, C minor, 401s). Audio sourced from the KROOKS Records YouTube
  upload (duration-matched 2015 album version, not the Crussen Remix).

  Thesis: a LIVING LENIA ECOSYSTEM — continuous cellular automata (Bert Chan
  2018). A warm field where emergent organisms bloom, glide, meet, merge, and
  dissolve, never settling. The beat feeds and spawns life; each section drives
  the ecosystem through a dramatically different life-regime. For "Days Without
  You": presence and loss as the endless cycle of forms emerging and passing.
  (This is the v2 thesis; v1 was a Josephson-junction two-blob piece that read
  as boring — one motif for 6.5 min. See brainstorming/pieces/days-without-you.md
  "RESTART".)

  Algorithm: Lenia. State A in [0,1] on a grid; one ping-pong sim pass
  (lenia.frag) computes A(t+dt) = clamp(A + dt*G(K*A)), where K is a smooth ring
  kernel (radius R=11), K*A the neighbourhood potential U, and G a gaussian
  growth mapping G(u)=2*exp(-(u-mu)^2/(2*sig^2))-1. Pure gather (convolution +
  local growth), no scatter -> fits the ping-pong engine. Robustness against the
  Lenia knife-edge: a GATED primordial-soup noise feed (only where U and A are
  near-empty) perpetually re-seeds dead regions while colonies evolve cleanly,
  so the field never dies; beat blooms re-seed on the groove.

  Destruction (music-linked, method evolves per section): a damage channel (.g)
  carves the colony, which regrows into the scars (a growth/destruction cycle =
  lots of motion). The METHOD changes per section: verse/drop = expanding
  SHOCKWAVE rings; vocal = radial CRACKS from a wandering fault; build = a
  sweeping RIP/slash; climax = multi-point SHATTER blasts every beat; outro/fade =
  global DISSOLUTION burn. Idle cycles the methods so it stays alive + varied.

  Palette (3 colours by meaning — cold exception, the warm has physical meaning):
  TEAL = living colony; AMBER/GOLD = membrane rims; MAGENTA->white = destruction
  front, ORANGE embers in the cooling wake. (lint-palette flags the teal as a
  warm-only violation; that override is intentional — Louis asked for more than
  orange; teal=life / warm=destruction fits VISION's cold exception.)

  Display: A -> teal colony (luminance), |grad A| -> amber rims, damage .g ->
  magenta/white destruction flash with orange ember wake.

  Audio (life + motion, not glow):
    - kick / bass -> beat blooms: a growth pulse + sparse fresh spawn (the field
        breathes and spawns on the groove).
    - drums -> agitation: raises dt (faster evolution = frantic life).
    - vocals -> mu shift toward the lush-life regime.
    - other  -> sig (growth width) -> morphology change.
    - section_id -> regime preset (mu,sig,dt,feed): intro sparse / verse gliders /
        drop turbulent bloom / vocal lush colony / build migrate+merge / climax
        frantic / outro die-off / fade near-empty. The section VOCABULARY.
    - downbeat/bar_phase -> an expanding ring (visible phase-lock).

  Idle (no audio): the CA self-drives; the gated noise-feed perpetually re-seeds
  and a slow internal clock drifts mu/sig/dt, so it never repeats and never dies.

  Mouse: a fertile zone — drag to inject living matter + boost local growth
  (garden the ecosystem). Keyboard synth: each key plants a seed patch at a
  key-mapped position.

  Arc: intro sparse soup -> verse gliders + small colonies -> drop turbulent
  bloom -> vocal lush dense colony -> build colonies migrate and merge -> climax
  frantic life everywhere -> outro die-off into voids -> fade to a last glider,
  then near-black.
