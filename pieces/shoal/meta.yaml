  ## Thesis
  Each pixel is the initial state (θ1, θ2) of a double pendulum,
  released from rest. Integrate it and a twin perturbed by 1e-4 for
  ~30 RK4 steps; pixel brightness is log(separation / 1e-4). Stable
  regions (KAM islands) read as soft solid colour; chaotic regions
  saturate bright. The viewer sees phase-space architecture —
  islands of regularity in a chaotic sea, which is what `shoal`
  means. Continuation of the 2swap study; companion to watershed.

  ## Build
  Single shader.frag. Per pixel: map gl_FragCoord to (θ1, θ2),
  initialise twin (θ1 perturbed by 1e-4), RK4-integrate both for 30
  steps with dt=0.065 (≈ 2s of system time), compute
  log(separation / 1e-4), smoothstep into chaosBrightness. Hue from
  atan2(sin θ2, sin θ1) into the warm ramp.

  ## Inputs
  - Cursor.x → initial momentum kick on pendulum 1 (~±1).
  - Cursor.y → gravity multiplier (~0.6–1.4).
  - Keyboard (15-key synth) → each key adds a unique signed
    initial-momentum impulse. Per-key distinct.
  - Audio.bass → additive gravity pulse (map breathes on kick).
  - Audio.high → sub-beat shimmer amplitude.
  Theme-only, self-playing.

  ## Palette
  Warm only: near-black void, then wine → ember → amber → gold →
  cream. Hue carries the state (θ1, θ2); luminance carries chaos
  intensity (stable = dim solid colour, chaotic = bright).

  ## Arc
  Self-playing, no fixed ending. A slow sin(u_time) brightness
  envelope keeps the field drifting; with audio, bass pulses
  gravity so islands grow and shrink on the kick.
