<!DOCTYPE html>
<!-- ABOUTME: Live studio page — fullscreen WebGL2 canvas with hot-reloading fragment -->
<!-- ABOUTME: shader, standard uniforms, keyboard navigation, and a faint metadata overlay. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>V-Jaygent · Studio</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="meta" class="overlay">
    <div class="title"></div>
    <div class="sub"></div>
  </div>

  <div id="error" class="overlay hidden">
    <div class="label">compile error</div>
    <pre class="body"></pre>
  </div>

  <div id="hint" class="overlay hint">
    ← →  next/prev     c  catalog     space  play/pause     drag bottom bar  scrub     r  reset time     h  toggle hud
  </div>

  <div id="audio-ui" class="audio-ui hidden">
    <div id="audio-progress" class="progress">
      <div class="track">
        <div id="audio-progress-fill" class="progress-fill"></div>
      </div>
      <div id="audio-progress-handle" class="handle"></div>
      <div id="audio-progress-tooltip" class="tooltip">0:00</div>
    </div>
    <div id="audio-input" class="audio-input hidden">
      <label for="audio-input-select">input</label>
      <select id="audio-input-select" aria-label="audio input device"></select>
    </div>
    <div id="audio-hint" class="audio-hint hidden"></div>
  </div>

  <div id="catalog" class="catalog hidden">
    <div class="catalog-inner"></div>
  </div>

  <div id="fps" class="fps">—</div>

  <script type="module" src="/runtime.mjs"></script>
</body>
</html>
